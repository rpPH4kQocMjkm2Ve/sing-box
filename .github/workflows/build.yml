name: Build

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - VERSION
      - Makefile
      - .github/workflows/build.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set image name
        id: img
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sing-box" >> "$GITHUB_OUTPUT"

      - name: Read version
        id: ver
        run: |
          tag=$(cat VERSION)
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Invalid VERSION: ${tag}"; exit 1; }
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Clone upstream
        run: |
          git clone --branch ${{ steps.ver.outputs.tag }} --depth 1 \
            https://github.com/SagerNet/sing-box.git .build/src
          cp Dockerfile .build/src/Dockerfile

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build
        run: |
          VER=${{ steps.ver.outputs.tag }}
          VER=${VER#v}
          podman build --platform linux/amd64 \
            -t ${{ steps.img.outputs.image }}:${VER} \
            -t ${{ steps.img.outputs.image }}:latest \
            .build/src

      - name: Push
        run: |
          VER=${{ steps.ver.outputs.tag }}
          VER=${VER#v}
          podman push ${{ steps.img.outputs.image }}:${VER}
          podman push ${{ steps.img.outputs.image }}:latest

  build-binary:
    name: Build sing-box for arm64 (musl naive)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: ver
        run: |
          tag=$(cat VERSION)
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Invalid VERSION: ${tag}"; exit 1; }
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '~1.25'

      - name: Clone upstream sing-box
        run: |
          git clone --branch ${{ steps.ver.outputs.tag }} --depth 1 \
            https://github.com/SagerNet/sing-box.git .build/src
          cd .build/src

      - name: Get cronet-go version
        id: cronet
        run: |
          cd .build/src
          CRONET_GO_VERSION=$(cat .github/CRONET_GO_VERSION)
          echo "version=${CRONET_GO_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Clone cronet-go
        run: |
          mkdir -p ~/cronet-go
          git init ~/cronet-go
          git -C ~/cronet-go remote add origin https://github.com/sagernet/cronet-go.git
          git -C ~/cronet-go fetch --depth=1 origin "${{ steps.cronet.outputs.version }}"
          git -C ~/cronet-go checkout FETCH_HEAD
          git -C ~/cronet-go submodule update --init --recursive --depth=1

      - name: Regenerate Debian keyring
        run: |
          rm -f ~/cronet-go/naiveproxy/src/build/linux/sysroot_scripts/keyring.gpg
          cd ~/cronet-go
          GPG_TTY=/dev/null ./naiveproxy/src/build/linux/sysroot_scripts/generate_keyring.sh

      - name: Cache Chromium toolchain
        id: cache-chromium
        uses: actions/cache@v5
        with:
          path: |
            ~/cronet-go/naiveproxy/src/third_party/llvm-build/
            ~/cronet-go/naiveproxy/src/gn/out/
            ~/cronet-go/naiveproxy/src/chrome/build/pgo_profiles/
            ~/cronet-go/naiveproxy/src/out/sysroot-build/
          key: chromium-toolchain-${{ runner.os }}-arm64-musl-${{ steps.cronet.outputs.version }}

      - name: Download Chromium toolchain
        if: steps.cache-chromium.outputs.cache-hit != 'true'
        run: |
          cd ~/cronet-go
          go run ./cmd/build-naive --target=linux/arm64 --libc=musl download-toolchain

      - name: Set Chromium toolchain environment
        run: |
          cd ~/cronet-go
          go run ./cmd/build-naive --target=linux/arm64 --libc=musl env >> $GITHUB_ENV

      - name: Build sing-box
        run: |
          cd .build/src
          mkdir -p dist
          TAGS="with_naive_outbound,with_musl,badlinkname,tfogo_checklinkname0"
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            go build -v -trimpath -buildvcs=false -o dist/sing-box -tags "$TAGS" \
            -ldflags "-s -w -checklinkname=0 -X 'github.com/sagernet/sing-box/constant.Version=${{ steps.ver.outputs.tag }}'" \
            ./cmd/sing-box

      - name: Extract libcronet.so
        run: |
          cd .build/src
          CGO_ENABLED=0 go run -v github.com/sagernet/cronet-go/cmd/build-naive@${{ steps.cronet.outputs.version }} \
            extract-lib --target linux/arm64 -o dist

      - name: Prepare flat tarball
        run: |
          VER="${{ steps.ver.outputs.tag }}"
          OUTPUT="sing-box-${VER}-arm64-musl-naive.tar.gz"
          cd .build/src/dist
          tar -czvf "${{ github.workspace }}/${OUTPUT}" sing-box libcronet.so ../LICENSE
          echo "ASSET=${OUTPUT}" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: false
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

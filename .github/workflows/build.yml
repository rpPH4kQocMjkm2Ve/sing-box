name: Build

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - VERSION
      - Makefile
      - .github/workflows/build.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set image name
        id: img
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sing-box" >> "$GITHUB_OUTPUT"

      - name: Read version
        id: ver
        run: |
          tag=$(cat VERSION)
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::Invalid VERSION: ${tag}"; exit 1; }
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Clone upstream
        run: |
          git clone --branch ${{ steps.ver.outputs.tag }} --depth 1 \
            https://github.com/SagerNet/sing-box.git .build/src
          cp Dockerfile .build/src/Dockerfile

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build
        run: |
          VER=${{ steps.ver.outputs.tag }}
          VER=${VER#v}
          podman build --platform linux/amd64 \
            -t ${{ steps.img.outputs.image }}:${VER} \
            -t ${{ steps.img.outputs.image }}:latest \
            .build/src

      - name: Push
        run: |
          VER=${{ steps.ver.outputs.tag }}
          VER=${VER#v}
          podman push ${{ steps.img.outputs.image }}:${VER}
          podman push ${{ steps.img.outputs.image }}:latest
